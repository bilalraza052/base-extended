<div class="p-3">

  <!-- ── osl-setup: Table + Card View Demo ─────────────────────── -->
  <osl-setup
    title="Leads"
    stateKey="leads-list"
    [columns]="columns"
    [datasource]="leads"
    [loading]="loading"
    [isPaginated]="true"
    [autoMode]="true"
    [totalRecords]="leads.length"
    [cardPageSize]="6"
    [formElements]="formElements"
    [moreMenuActions]="moreMenu"
    [canAdd]="true"
    [canEdit]="true"
    [canDelete]="true"
    tableHeight="calc(100vh - 180px)"
   
    (onEdit)="onEdit($event)"
    (onDelete)="onDeleteLead($event)"
    (pageChange)="onPageChange($event)"
  ></osl-setup>

</div>
