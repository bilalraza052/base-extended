

  <!-- ── Form Grid ─────────────────────────────────────────────── -->
  <div class="ex-card mb-4">
    <div class="ex-card__head">
      <span class="ex-badge ex-badge--blue">Form Grid</span>
      <span class="ex-card__desc">Inline edits and row add/delete also mark the page dirty</span>
    </div>
    <div class="ex-card__body">
      <osl-form-grid
        [columns]="orderColumns"
        [datasource]="orderRows"
        (datasourceChange)="onDemoGridChange($event)"
        [canAdd]="false"
        [canDelete]="true"
        tableHeight="300px"
        [enableDragDrop]="true"
        [draggingList]="draggingList"
        [draggingColumns]="draggingColumns"
        [leftPanelWidth]="280"
        dragTitle="Charges"
        [showSearch]="true"
        [allowReorder]="false"
        [allowRemove]="true"
        panelSearchType="Api"
        [panelLoading]="panelLoading"
        [panelTotalRecords]="panelTotalRecords"
        (panelSearch)="onPanelSearch($event)"
        (panelPageChange)="onPanelPageChange($event)"
        (dragStarted)="onDragStarted($event)"
        (dragEnded)="onDragEnded($event)"
        (dragEntered)="onDragEntered($event)"
        (dragExited)="onDragExited($event)"
        (itemDropped)="onItemDropped($event)"
        (itemMoved)="onItemMoved($event)"
        (itemRemoved)="onItemRemoved($event)"
        (itemSelected)="onItemSelected($event)"
        (gridChanged)="onGridChanged($event)"
      ></osl-form-grid>
    </div>

</div>
