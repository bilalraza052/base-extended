<div class="delete-dialog-container">

  <!-- Header: centered icon + top-right close -->
  <div class="delete-dialog-header">
    <div class="delete-icon-wrapper">
      <div class="delete-icon-ring">
        <svg class="delete-icon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zm2.46-7.12 1.41-1.41L12 12.59l2.12-2.12 1.41 1.41L13.41 14l2.12 2.12-1.41 1.41L12 15.41l-2.12 2.12-1.41-1.41L10.59 14l-2.13-2.12zM15.5 4l-1-1h-5l-1 1H5v2h14V4z"/>
        </svg>
      </div>
    </div>
    <button mat-icon-button class="close-btn" (click)="cancel()">
      <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
        <path d="M19 6.41 17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
      </svg>
    </button>
  </div>

  <!-- Body -->
  <mat-dialog-content class="delete-dialog-content">
    <h2 class="delete-title">{{ data.title }}</h2>
    <p class="delete-message">{{ data.message }}</p>
  </mat-dialog-content>

  <!-- Actions -->
  <mat-dialog-actions class="delete-dialog-actions">
    <button mat-stroked-button class="cancel-btn" (click)="cancel()">
      <svg class="btn-icon" viewBox="0 0 24 24" fill="currentColor">
        <path d="M19 6.41 17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
      </svg>
      {{ data.cancelText }}
    </button>
    <button mat-flat-button class="confirm-btn" (click)="confirm()">
      <svg class="btn-icon" viewBox="0 0 24 24" fill="currentColor">
        <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zm2.46-7.12 1.41-1.41L12 12.59l2.12-2.12 1.41 1.41L13.41 14l2.12 2.12-1.41 1.41L12 15.41l-2.12 2.12-1.41-1.41L10.59 14l-2.13-2.12zM15.5 4l-1-1h-5l-1 1H5v2h14V4z"/>
      </svg>
      {{ data.confirmText }}
    </button>
  </mat-dialog-actions>

</div>
