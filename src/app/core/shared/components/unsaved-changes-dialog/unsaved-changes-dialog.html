<div class="ucd-wrap">

  <!-- Amber gradient header zone + icon -->
  <div class="ucd-header">
    <button mat-icon-button class="ucd-close" (click)="cancel()" aria-label="Close">
      <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
        <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
      </svg>
    </button>
    <div class="ucd-icon-ring">
      <svg class="ucd-icon-svg" viewBox="0 0 24 24" fill="currentColor">
        <path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/>
      </svg>
    </div>
  </div>

  <!-- Content -->
  <mat-dialog-content class="ucd-body">
    <h2 class="ucd-title">Unsaved Changes</h2>
    <p class="ucd-subtitle">You have unsaved changes that will be lost if you leave this page.</p>
  </mat-dialog-content>

  <!-- Actions — all buttons on one line -->
  <mat-dialog-actions class="ucd-actions">
    <button mat-stroked-button class="ucd-btn ucd-stay" (click)="cancel()">
      <svg class="ucd-btn-icon" viewBox="0 0 24 24" fill="currentColor">
        <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
      </svg>
      <span>Stay on Page</span>
    </button>
    <button mat-stroked-button class="ucd-btn ucd-leave" (click)="leave()">
      <svg class="ucd-btn-icon" viewBox="0 0 24 24" fill="currentColor">
        <path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/>
      </svg>
      <span>Leave Page</span>
    </button>
    @if (data.hasSaveCallback) {
      <button mat-flat-button class="ucd-btn ucd-save" (click)="save()">
        <svg class="ucd-btn-icon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M17 3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V7l-4-4zm-5 16c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm3-10H5V5h10v4z"/>
        </svg>
        <span>Save &amp; Leave</span>
      </button>
    }
  </mat-dialog-actions>

</div>
