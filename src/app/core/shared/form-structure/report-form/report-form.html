<!-- ── Form view (hidden when results are shown) ────────────────────────── -->
@if (!showResultView) {
  <div class="orf-card">

    <!-- Header -->
    <div class="orf-header">
      <div class="orf-header__left">
        <div class="orf-header__icon-wrap">
          <svg class="orf-header__icon" viewBox="0 0 24 24" fill="none">
            <rect x="3" y="3" width="18" height="18" rx="3" stroke="currentColor" stroke-width="1.5"/>
            <path d="M8 16V11" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            <path d="M12 16V8"  stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            <path d="M16 16V13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="orf-header__text">
          <h4 class="orf-header__title">{{ title }}</h4>
          <p class="orf-header__sub">Configure parameters and generate report</p>
        </div>
      </div>

      <div class="orf-header__right">
        @for (type of generateOptions; track type) {
          <button
            class="orf-type-btn"
            [class.active]="selectedType === type"
            [class.orf-type-btn--pdf]="type === 'pdf'"
            [class.orf-type-btn--excel]="type === 'excel'"
            [class.orf-type-btn--grid]="type === 'grid'"
            (click)="selectType(type)"
            type="button"
          >
            @if (type === 'pdf') {
              <svg class="orf-btn-icon" viewBox="0 0 24 24" fill="none">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"
                      stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                <path d="M14 2v6h6" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                <path d="M9 13h1.5a1.5 1.5 0 0 1 0 3H9v-4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
                <path d="M14 13v4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
                <path d="M14 13h1.5a1.5 1.5 0 0 1 0 3H14" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
              </svg>
            }
            @if (type === 'excel') {
              <svg class="orf-btn-icon" viewBox="0 0 24 24" fill="none">
                <rect x="2" y="3" width="20" height="18" rx="2" stroke="currentColor" stroke-width="1.5"/>
                <path d="M2 8h20" stroke="currentColor" stroke-width="1.5"/>
                <path d="M8 8v13M14 8v13" stroke="currentColor" stroke-width="1.2"/>
                <path d="M2 13h20M2 18h20" stroke="currentColor" stroke-width="1.2"/>
              </svg>
            }
            @if (type === 'grid') {
              <svg class="orf-btn-icon" viewBox="0 0 24 24" fill="none">
                <rect x="3"  y="3"  width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
                <rect x="14" y="3"  width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
                <rect x="3"  y="14" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
                <rect x="14" y="14" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
              </svg>
            }
            <span>{{ typeLabel(type) }}</span>
          </button>
        }
      </div>
    </div>

    <!-- Section divider with label -->
    <div class="orf-section-divider">
      <div class="orf-section-divider__line"></div>
      <span class="orf-section-divider__label">
        <svg viewBox="0 0 16 16" fill="none">
          <path d="M2 4h12M2 8h9M2 12h6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
        Report Parameters
      </span>
      <div class="orf-section-divider__line"></div>
    </div>

    <!-- Form Body -->
    <div class="orf-body">
      <osl-dynamic-form
        [elements]="formElements"
        [model]="model"
        (modelChange)="onModelChange($event)"
        [skeletonLoading]="skeletonLoading"
        [skeletonTheme]="skeletonTheme"
      ></osl-dynamic-form>
    </div>

    <!-- Footer -->
    <div class="orf-footer">
      <button
        class="orf-generate-btn"
        (click)="generate()"
        [disabled]="generating"
        type="button"
      >
        @if (generating) {
          <span class="orf-generate-btn__spinner"></span>
          <span>Generating...</span>
        } @else {
          @if (selectedType === 'pdf') {
            <svg class="orf-btn-icon" viewBox="0 0 24 24" fill="none">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"
                    stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
              <path d="M14 2v6h6" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
            </svg>
          }
          @if (selectedType === 'excel') {
            <svg class="orf-btn-icon" viewBox="0 0 24 24" fill="none">
              <rect x="2" y="3" width="20" height="18" rx="2" stroke="currentColor" stroke-width="1.8"/>
              <path d="M2 8h20M8 8v13M14 8v13M2 13h20M2 18h20" stroke="currentColor" stroke-width="1.5"/>
            </svg>
          }
          @if (selectedType === 'grid') {
            <svg class="orf-btn-icon" viewBox="0 0 24 24" fill="none">
              <rect x="3"  y="3"  width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.8"/>
              <rect x="14" y="3"  width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.8"/>
              <rect x="3"  y="14" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.8"/>
              <rect x="14" y="14" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.8"/>
            </svg>
          }
          <span>Generate {{ typeLabel(selectedType) }}</span>
          <svg class="orf-generate-btn__arrow" viewBox="0 0 20 20" fill="none">
            <path d="M4 10h12M11 5l5 5-5 5" stroke="currentColor" stroke-width="1.8"
                  stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        }
      </button>
    </div>

  </div>
}

<!-- ── Full-screen results view ─────────────────────────────────────────── -->
@if (showResultView) {

    <!-- Results header bar -->
    <div class="orf-results-header">

      <div class="orf-results-header__left">
        <button class="orf-back-btn" (click)="backToForm()" type="button">
          <svg class="orf-btn-icon" viewBox="0 0 20 20" fill="none">
            <path d="M16 10H4M9 5l-5 5 5 5" stroke="currentColor" stroke-width="1.8"
                  stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span>Back</span>
        </button>
        <div class="orf-results-header__sep"></div>
        <svg class="orf-results-header__report-icon" viewBox="0 0 24 24" fill="none">
          <rect x="3" y="3" width="18" height="18" rx="3" stroke="currentColor" stroke-width="1.5"/>
          <path d="M8 16V11M12 16V8M16 16V13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
        <span class="orf-results-header__title">{{ title }}</span>
        <span class="orf-results-badge">
          <svg class="orf-btn-icon" viewBox="0 0 16 16" fill="none">
            <rect x="2" y="2"  width="12" height="3" rx="1" fill="currentColor"/>
            <rect x="2" y="7"  width="12" height="3" rx="1" fill="currentColor" opacity=".65"/>
            <rect x="2" y="12" width="8"  height="2" rx="1" fill="currentColor" opacity=".35"/>
          </svg>
          {{ resultDatasource.length | number }} records
        </span>
      </div>

            </svg>
            <span>PDF</span>
          </button>
        }
      </div> -->

    </div>

    <!-- Report grid -->
    <div class="orf-results-body">
      <osl-report-grid
        [columns]="reportColumns"
        [datasource]="resultDatasource"
        [loading]="generating"
        [title]="title"
        tableHeight="calc(100vh - 365px)"
        [pageSize]="pageSize"
        [exportable]="true"
        [pdfExportFromGrid]="true"
        [pdfConfig]="_mergedPdfConfig"
        [showAggregates]="true"
        [striped]="true"
      ></osl-report-grid>
    </div>

}
