<div class="p-2">

  <!-- Header -->
  <div class="osl-setup-header">
    <h5 class="mb-0">{{ title }}</h5>
    <div class="d-flex align-items-center gap-2">
      <osl-searchbar #searchbar class="mx-2" (onSearch)="onSearchSetup($event)"></osl-searchbar>
      @if(!isLister){
        <osl-button 
          variant="secondary"
          size="sm"
          [label]="'Add ' + title"
          (clickEv)="openAddDialog()"
        ></osl-button>

      }
    </div>
  </div>

  <!-- Grid -->
  <div class="osl-setup-body my-2">
    <osl-grid
      #gridRef
      [columns]="columnsWithActions"
      [(datasource)]="datasource"
      [isPaginated]="isPaginated"
      [pageSize]="pageSize"
      [autoMode]="autoMode"
      [tableHeight]="tableHeight"
      [totalRecords]="totalRecords"
      [loading]="loading"
      [moreMenuActions]="moreMenuActions"
      (editClick)="openEditDialog($event)"
      (deleteClick)="onDeleteClick($event)"
      (pageChange)="onPageChange(pageChange,$event)"
      (pageSizeChange)="onPageChange(pageSizeChange,$event)"
      (sortChange)="sortChange.emit($event)"
      [isSelectable]="isLister";
      (onRowClick)="onRowClick.emit($event)"
    />
  </div>

</div>

<!-- Dialog: Form Body -->
<ng-template #formBodyTpl>
  <osl-dynamic-form
  [skeletonLoading]="formLoading"
    [elements]="formElements"
    [(model)]="dialogModel"
  ></osl-dynamic-form>
</ng-template>

<!-- Dialog: Form Footer -->
<ng-template #formFooterTpl>
  <div class="osl-setup-dialog-footer">


    <osl-button [loading]="saveLoading" variant="secondary" label="Save" (click)="saveDialog()"></osl-button>
  </div>
</ng-template>

<!-- Wrapper that bridges DialogWrapper's implicit context to the custom footer template -->
<ng-template #customFooterWrapperTpl let-data>
  <ng-container *ngTemplateOutlet="customFormFooter!; context: { $implicit: { dialogModel: dialogModel, dialogMode: dialogMode, dialogRef: data.dialogRef } }"></ng-container>
</ng-template>
