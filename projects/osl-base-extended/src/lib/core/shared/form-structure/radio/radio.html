<div class="d-flex flex-column">
    @if(label){
        <div [oslSkeleton]="skeletonLoading" [oslSkeletonTheme]="skeletonTheme">
            <label class="label">{{label}} <span class="txt-clr-red">{{required?'*':''}}</span></label>
    
        </div>

    }
    <div class="radio-group" [oslSkeleton]="skeletonLoading" [oslSkeletonTheme]="skeletonTheme" [class.radio-inline]="inline">
        @for(item of datasource; track item) {
            <label class="radio-item" [class.disabled]="disabled">
                <input
                    type="radio"
                    [name]="groupName"
                    [checked]="isChecked(item)"
                    [disabled]="disabled"
                    (change)="onSelect(item)"
                >
                <span>{{getDisplay(item)}}</span>
            </label>
        }
    </div>
</div>
