<div class="ed-container">

  <!-- Header -->
  <div class="ed-header">
    <div class="ed-icon-wrapper">
      <div class="ed-icon-ring">
        <svg class="ed-icon-svg" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
        </svg>
      </div>
    </div>
    <button mat-icon-button class="ed-close-btn" (click)="close()" aria-label="Close">
      <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
        <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
      </svg>
    </button>
  </div>

  <!-- Body -->
  <mat-dialog-content class="ed-body">
    <h2 class="ed-title">{{ data.title }}</h2>
    <p class="ed-subtitle">
      Please fix the following
      <strong>{{ data.errors.length }}</strong>
      {{ data.errors.length === 1 ? 'issue' : 'issues' }} before proceeding.
    </p>
    <ul class="ed-list">
      @for (err of data.errors; track $index) {
        <li class="ed-item" [style.animation-delay]="($index * 60) + 'ms'">
          <span class="ed-item-dot"></span>
          <span class="ed-item-text">{{ err }}</span>
        </li>
      }
    </ul>
  </mat-dialog-content>

  <!-- Actions -->
  <mat-dialog-actions class="ed-actions">
    <button mat-flat-button class="ed-confirm-btn" (click)="close()">
      <svg class="ed-btn-icon" viewBox="0 0 24 24" fill="currentColor">
        <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
      </svg>
      Got it
    </button>
  </mat-dialog-actions>

</div>
