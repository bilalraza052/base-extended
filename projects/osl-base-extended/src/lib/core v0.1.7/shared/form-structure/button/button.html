<button [class]="classes" [type]="type" [disabled]="disabled || loading" (click)="onClick()">
    @if(loading){
        <span class="osl-btn__spinner"></span>
    }
    <span class="osl-btn__label">{{label}}</span>
    @if(icon){
        <span class="osl-btn__label-icon"><mat-icon>{{icon}}</mat-icon></span>

    }
</button>
