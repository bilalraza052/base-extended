<div class="d-flex flex-column">
    <label class="label" [class.txt-clr-red]="myField.touched && myField.invalid">{{label}} <span class="txt-clr-red">{{required?'*':''}}</span></label>
    <textarea [rows]="textareaRows" (change)="changeEv.emit(model)" [ngModel]="model" (ngModelChange)="onModelChange($event)"
  [required]="required" [disabled]="disabled"  #myField="ngModel" type="text" [class.error]="myField.touched && myField.invalid"></textarea>
    @if(myField.touched && myField.invalid && required){
        <mat-hint  class="hint">{{label}} is Required!</mat-hint>

    }
    
</div>
