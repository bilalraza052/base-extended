<div class="d-flex flex-column">
    <label class="label" [class.txt-clr-red]="isInvalid">{{label}} <span class="txt-clr-red">{{required?'*':''}}</span></label>
    <div class="autocomplete-wrapper">
        <input [value]="inputValue" (input)="onInput($any($event.target).value)" (focus)="onFocus()"
            (blur)="onBlur()" [disabled]="disabled" [class.error]="isInvalid" autocomplete="off"
            placeholder="Type to search...">
        @if(showDropdown){
            <div class="dropdown">
                @if(filteredItems.length > 0){
                    @for(item of filteredItems; track item){
                        <div class="dropdown-item" (mousedown)="selectItem(item)">{{getDisplay(item)}}</div>
                    }
                } @else {
                    <div class="no-results">No results found</div>
                }
            </div>
        }
    </div>
    @if(isInvalid){
        <mat-hint class="hint">{{label}} is Required!</mat-hint>
    }
</div>
