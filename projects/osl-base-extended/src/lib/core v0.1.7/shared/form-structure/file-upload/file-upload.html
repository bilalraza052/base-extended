<div class="d-flex flex-column">
    <label class="label" [class.txt-clr-red]="isInvalid">{{label}} <span class="txt-clr-red">{{required?'*':''}}</span></label>
    <input type="file" [accept]="accept" [disabled]="disabled" (change)="onFileChange($event)" #fileInput class="file-input">
    <div class="file-display" [class.error]="isInvalid" [class.file-disabled]="disabled" (click)="triggerInput(fileInput)">
        <span class="file-name" [class.selected]="!!fileName">{{fileName || 'Choose file...'}}</span>
        <span class="browse-btn">Browse</span>
    </div>
    @if(isInvalid){
        <mat-hint class="hint">{{label}} is Required!</mat-hint>
    }
</div>
