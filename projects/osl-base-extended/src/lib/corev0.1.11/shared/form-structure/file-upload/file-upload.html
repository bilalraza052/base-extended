<div class="d-flex flex-column">
    <label class="label" [class.txt-clr-red]="isInvalid">
        {{label}} <span class="txt-clr-red">{{required?'*':''}}</span>
    </label>

    <input
        type="file"
        [accept]="accept"
        [multiple]="multiple"
        [disabled]="disabled"
        (change)="onFileChange($event)"
        #fileInput
        class="file-input"
    >

    <div
        class="drop-zone"
        [class.error]="isInvalid || sizeError"
        [class.file-disabled]="disabled"
        [class.drag-over]="isDragOver"
        [class.has-file]="!!model"
        (click)="triggerInput(fileInput)"
        (dragover)="onDragOver($event)"
        (dragleave)="onDragLeave()"
        (drop)="onDrop($event)"
    >
        @if(!model) {
            <div class="drop-content">
                <mat-icon class="upload-icon">upload_file</mat-icon>
                <div class="drop-text">
                    <span class="browse-link">Browse</span> or drag &amp; drop
                </div>
                @if(accept) { <div class="drop-meta">{{accept}}</div> }
                @if(maxSize) { <div class="drop-meta">{{maxSizeLabel}}</div> }
            </div>
        } @else {
            <div class="file-list">
                <mat-icon class="file-icon">insert_drive_file</mat-icon>
                <span class="file-name">{{fileNames}}</span>
                <button type="button" class="clear-btn" (click)="clearFiles($event)" title="Remove">
                    <mat-icon>close</mat-icon>
                </button>
            </div>
        }
    </div>

    @if(sizeError) {
        <mat-hint class="hint">File exceeds the {{maxSizeLabel}} limit.</mat-hint>
    } @else if(isInvalid) {
        <mat-hint class="hint">{{label}} is Required!</mat-hint>
    }
</div>
