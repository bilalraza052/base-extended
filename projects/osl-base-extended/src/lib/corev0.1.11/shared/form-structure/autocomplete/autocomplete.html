<div class="d-flex flex-column">
    <label class="label" [class.txt-clr-red]="isInvalid">
        {{label}} <span class="txt-clr-red">{{required?'*':''}}</span>
    </label>
    <div class="autocomplete-wrapper" [class.error]="isInvalid">
        <input
            [value]="inputValue"
            (input)="onInput($any($event.target).value)"
            (focus)="onFocus()"
            (blur)="onBlur()"
            [disabled]="disabled || loading"
            [class.error]="isInvalid"
            [placeholder]="loading ? 'Loading...' : placeholder"
            autocomplete="off"
        >
        @if(loading) {
            <span class="ac-spinner"></span>
        } @else if(inputValue && !disabled) {
            <button type="button" class="ac-clear" (mousedown)="clearValue($event)" tabindex="-1" title="Clear">
                <mat-icon>close</mat-icon>
            </button>
        }
        @if(showDropdown && !loading) {
            <div class="dropdown">
                @if(filteredItems.length > 0) {
                    @for(item of filteredItems; track item) {
                        <div class="dropdown-item" (mousedown)="selectItem(item)">{{getDisplay(item)}}</div>
                    }
                } @else {
                    <div class="no-results">No results found</div>
                }
            </div>
        }
    </div>
    @if(isInvalid) {
        <mat-hint class="hint">{{label}} is Required!</mat-hint>
    }
</div>
